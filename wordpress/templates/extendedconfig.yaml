apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wordpress.fullname" . }}-extended
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
data:
  000-default.conf: |
    {{- if .Values.apacheDefaultSiteConfig }}
    {{ .Values.apacheDefaultSiteConfig | nindent 4 }}
    {{- else }}
    <VirtualHost *:{{ .Values.containerPort }}>
            ServerAdmin webmaster@localhost
            DocumentRoot /var/www/html

            <Directory /var/www/html>
                Options FollowSymLinks
                AllowOverride FileInfo Options Limit
                Require all granted
            </Directory>

            # Pass Authorization header to PHP via environment variable
            # Uses case-insensitive match and requires non-empty value
            SetEnvIfNoCase Authorization "(.+)" HTTP_AUTHORIZATION=$1

            ErrorLog ${APACHE_LOG_DIR}/error.log
            CustomLog ${APACHE_LOG_DIR}/access.log combined
    </VirtualHost>
    {{- end }}
  ports.conf: |
    {{- if .Values.apachePortsConfig }}
    {{ .Values.apachePortsConfig | nindent 4 }}
    {{- else }}
    Listen {{ .Values.containerPort }}
    {{- end }}
  custom.ini: |
    {{- if .Values.customPhpConfig }}
    {{ .Values.customPhpConfig | nindent 4 }}
    {{- else }}
    upload_max_filesize = {{ .Values.settings.maxFileUploadSize }}
    post_max_size = {{ .Values.settings.maxFileUploadSize }}
    memory_limit = {{ .Values.settings.memoryLimit }}
    {{- end }}
  rest-api-users-access.php: |
    <?php
    /**
     * MU-Plugin: Allow authenticated users to access REST API /users endpoint.
     *
     * Themes or plugins may blanket-block /wp/v2/users to prevent user
     * enumeration. This override ensures logged-in users (e.g. admins
     * creating application passwords) are not affected.
     */
    add_filter('rest_pre_dispatch', function ($result, $server, $request) {
        if (is_wp_error($result)
            && $result->get_error_code() === 'rest_forbidden'
            && strpos($request->get_route(), '/wp/v2/users') !== false
            && is_user_logged_in()) {
            return null;
        }
        return $result;
    }, 20, 3);
